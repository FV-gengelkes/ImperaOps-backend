services:
  mysql:
    image: mysql:8.0
    container_name: imperaops-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: imperaops
      MYSQL_USER: imperaops
      MYSQL_PASSWORD: imperaops
    ports:
      - "3306:3306"
    command: ["--default-authentication-plugin=mysql_native_password"]
    volumes:
      - imperaops_mysql_data:/var/lib/mysql

  adminer:
    image: adminer:latest
    container_name: imperaops-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - mysql

  minio:
    image: minio/minio:latest
    container_name: imperaops-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - imperaops_minio_data:/data

volumes:
  imperaops_mysql_data:
  imperaops_minio_data:
